<!DOCTYPE html>
<html>
<head>
    <title>Mini-Grid Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: rgba(30, 41, 59, 0.95);
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        .login-box h1 {
            color: #00ffff;
            margin-bottom: 10px;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #00ffff;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            margin-top: 10px;
        }

        .login-box button:hover {
            background: #00cccc;
        }

        .error {
            color: #ff4d4d;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .note {
            margin-top: 15px;
            font-size: 14px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>⚡ Mini-Grid AI System</h1>
    <h2>Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="note">
        Username: <b>admin</b><br>
        Password: <b>1234</b>
    </div>
</div>

</body>
</html>
